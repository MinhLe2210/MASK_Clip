services:
  triton:
    image: nvcr.io/nvidia/tritonserver:25.08-py3
    container_name: ai-detector-triton
    restart: unless-stopped
    ports:
      - "${TRITON_HTTP_PORT:-30000}:8000"
      - "${TRITON_GRPC_PORT:-30001}:8001"
      - "${TRITON_METRICS_PORT:-30002}:8002"
    volumes:
      - ./model_repository:/models
    gpus:
      - driver: nvidia
        device_ids: ["${TRITON_GPU_ID:-0}"]
    command: >
      tritonserver
      --model-repository=/models
      --log-verbose=1
      --strict-model-config=false

  pipeline:
    image: ai-detector-pipeline:latest
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      secrets:
        - pip_conf
        - apt_conf
    container_name: ai-detector-pipeline
    restart: unless-stopped
    depends_on:
      - triton
    ports:
      - "${PIPELINE_PORT:-8002}:8002"
    environment:
      HOST: 0.0.0.0
      PIPELINE_PORT: 8002
      TRITON_URL: ${TRITON_URL:-http://triton:8000}
      DEDUP_MODEL_NAME: ${DEDUP_MODEL_NAME:-dedup_embedder}
      DEDUP_INPUT_NAME: ${DEDUP_INPUT_NAME:-pixel_values}
      DEDUP_OUTPUT_NAME: ${DEDUP_OUTPUT_NAME:-features}
      DEDUP_IMAGE_SIZE: ${DEDUP_IMAGE_SIZE:-384}
      EMBED_DIM: ${EMBED_DIM:-384}
      CLASSIFIER_MODEL_NAME: ${CLASSIFIER_MODEL_NAME:-AI_images_detector}
      CLASSIFIER_INPUT_NAME: ${CLASSIFIER_INPUT_NAME:-pixel_values}
      CLASSIFIER_OUTPUT_NAME: ${CLASSIFIER_OUTPUT_NAME:-logits}
      CLASSIFIER_LABELS: ${CLASSIFIER_LABELS:-fake,real}
      CLASSIFIER_INPUT_SIZE: ${CLASSIFIER_INPUT_SIZE:-384}
      COLLECTION_NAME: ${COLLECTION_NAME:-ai_detector_images_deduplicate}
      MILVUS_HOST: ${MILVUS_HOST}
      MILVUS_PORT: ${MILVUS_PORT:-30865}
      MILVUS_DATABASE: ${MILVUS_DATABASE:-default}
      DUP_THRESHOLD: ${DUP_THRESHOLD:-0.999995}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_VLM_MODEL: ${OPENAI_VLM_MODEL:-gpt-5.4-mini}
      OPENAI_PROXY: ${OPENAI_PROXY:-}
      OPENAI_TIMEOUT: ${OPENAI_TIMEOUT:-60}
      PIPELINE_REQUEST_TIMEOUT: ${PIPELINE_REQUEST_TIMEOUT:-120}
      PIPELINE_BATCH_SIZE: ${PIPELINE_BATCH_SIZE:-8}
      PIPELINE_BATCH_TIMEOUT: ${PIPELINE_BATCH_TIMEOUT:-0.05}
      LITSERVE_MAX_PAYLOAD_SIZE: ${LITSERVE_MAX_PAYLOAD_SIZE:-100MB}
      LITSERVE_ACCELERATOR: cpu
      LITSERVE_DEVICES: 1
      LITSERVE_WORKERS_PER_DEVICE: ${LITSERVE_WORKERS_PER_DEVICE:-1}
      LITSERVE_REQUEST_TIMEOUT: ${LITSERVE_REQUEST_TIMEOUT:-180}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}


secrets:
  pip_conf:
    file: ${HOME}/.config/pip/pip.conf
  apt_conf:
    file: /etc/apt/apt.conf